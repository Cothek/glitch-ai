<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch Chat</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-sidebar: #0f0f1a;
    --bg-message-user: #7c3aed;
    --bg-message-assistant: #2d2d3d;
    --bg-message-error: #4a1525;
    --bg-input: #252540;
    --accent: #a855f7;
    --accent-hover: #9333ea;
    --accent-dim: #6b21a8;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #2a2a4a;
    --error: #ef4444;
    --sidebar-width: 260px;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .new-chat-btn {
    width: 100%;
    padding: 10px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s;
  }

  .new-chat-btn:hover { background: var(--accent-hover); }

  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .session-item {
    padding: 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, border-color 0.15s;
    border-left: 3px solid transparent;
    margin-bottom: 4px;
  }

  .session-item:hover { background: rgba(168, 85, 247, 0.1); }

  .session-item.active {
    background: rgba(168, 85, 247, 0.15);
    border-left-color: var(--accent);
  }

  .session-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 14px;
  }

  .session-count {
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* Main chat area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .menu-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 24px;
    cursor: pointer;
    padding: 4px;
  }

  .chat-title {
    font-size: 16px;
    font-weight: 600;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 18px;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; }
  .message.assistant { align-self: flex-start; }
  .message.error { align-self: center; max-width: 90%; }

  .message-role {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .message.user .message-role { text-align: right; }

  .message-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .message.user .message-bubble {
    background: var(--bg-message-user);
    border-bottom-right-radius: 4px;
  }

  .message.assistant .message-bubble {
    background: var(--bg-message-assistant);
    border-bottom-left-radius: 4px;
  }

  .message.error .message-bubble {
    background: var(--bg-message-error);
    border: 1px solid var(--error);
    color: var(--error);
  }

  .message-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .message.user .message-time { text-align: right; }

  /* Loading indicator */
  .loading {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .loading-dots {
    display: flex;
    gap: 4px;
  }

  .loading-dots span {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
  }

  .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
  .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
  }

  .input-wrapper {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    max-width: 800px;
    margin: 0 auto;
  }

  .input-wrapper textarea {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .input-wrapper textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .input-wrapper textarea:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .send-btn {
    padding: 12px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.2s, opacity 0.2s;
    white-space: nowrap;
  }

  .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Mobile responsive */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      transform: translateX(-100%);
    }

    .sidebar.open { transform: translateX(0); }

    .menu-toggle { display: block; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
    }

    .overlay.visible { display: block; }

    .message { max-width: 90%; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">
        <span>+</span> New Chat
      </button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </aside>

  <main class="main">
    <div class="chat-header">
      <button class="menu-toggle" id="menuToggle">&#9776;</button>
      <span class="chat-title" id="chatTitle">Glitch Chat</span>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">Start a conversation with Glitch</div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="messageInput"
          placeholder="Type a message..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>Send</button>
      </div>
    </div>
  </main>
</div>

<script>
(function() {
  'use strict';

  const $ = (sel) => document.querySelector(sel);
  const messagesEl = $('#messages');
  const emptyState = $('#emptyState');
  const sessionList = $('#sessionList');
  const messageInput = $('#messageInput');
  const sendBtn = $('#sendBtn');
  const newChatBtn = $('#newChatBtn');
  const chatTitle = $('#chatTitle');
  const menuToggle = $('#menuToggle');
  const sidebar = $('#sidebar');
  const overlay = $('#overlay');

  const DIRECTORY = 'E:/Glitch AI/glitch-ai';
  const DIRECTORY_PARAM = 'directory=' + encodeURIComponent(DIRECTORY);

  let activeSessionId = null;
  let isWaiting = false;
  let streamingBubble = null;
  let streamingText = '';
  let eventSource = null;
  let sseReconnectDelay = 1000;
  const SSE_MAX_RECONNECT = 30000;

  // ── DOM Events ──────────────────────────────────────────────

  messageInput.addEventListener('input', () => {
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = !messageInput.value.trim() || isWaiting;
  });

  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (messageInput.value.trim() && !isWaiting) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  newChatBtn.addEventListener('click', createNewSession);
  menuToggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('visible');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
  });

  // ── Helpers ─────────────────────────────────────────────────

  function formatTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  function showEmpty(show) {
    emptyState.style.display = show ? 'flex' : 'none';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  async function fetchJson(url, options = {}) {
    const res = await fetch(url, {
      ...options,
      headers: { 'Content-Type': 'application/json', ...options.headers },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    return res.json();
  }

  // ── Message Rendering ───────────────────────────────────────

  function addMessage(role, text, timestamp) {
    showEmpty(false);
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const roleLabel = role === 'user' ? 'You' : role === 'error' ? 'Error' : 'Glitch';
    const time = timestamp ? formatTime(timestamp) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    msg.innerHTML = `
      <span class="message-role">${roleLabel}</span>
      <div class="message-bubble">${escapeHtml(text)}</div>
      <span class="message-time">${time}</span>
    `;

    messagesEl.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function showLoading() {
    hideLoading();
    const loader = document.createElement('div');
    loader.className = 'loading';
    loader.id = 'loadingIndicator';
    loader.innerHTML = `
      <span>Glitch is thinking</span>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    `;
    messagesEl.appendChild(loader);
    scrollToBottom();
  }

  function hideLoading() {
    const loader = document.getElementById('loadingIndicator');
    if (loader) loader.remove();
  }

  function setLoading(loading) {
    isWaiting = loading;
    sendBtn.disabled = loading || !messageInput.value.trim();
    messageInput.disabled = loading;
    messageInput.placeholder = loading ? 'Waiting for response...' : 'Type a message...';
  }

  // ── Session Management ──────────────────────────────────────

  async function loadSessions() {
    try {
      const response = await fetchJson('/api/session?' + DIRECTORY_PARAM);
      const sessions = response.items || response || [];
      renderSessions(sessions);

      if (sessions.length === 0) {
        await createNewSession();
      } else if (!activeSessionId) {
        selectSession(sessions[0].id);
      }
    } catch (err) {
      console.error('Failed to load sessions:', err);
    }
  }

  function renderSessions(sessions) {
    sessionList.innerHTML = '';
    sessions.sort((a, b) => new Date(b.time_updated) - new Date(a.time_updated));

    for (const s of sessions) {
      const item = document.createElement('div');
      item.className = `session-item${s.id === activeSessionId ? ' active' : ''}`;
      item.dataset.sessionId = s.id;
      item.innerHTML = `
        <span class="session-name">${escapeHtml(s.title || 'Untitled')}</span>
        <span class="session-count">${s.message_count || 0}</span>
      `;
      item.addEventListener('click', () => {
        selectSession(s.id);
        sidebar.classList.remove('open');
        overlay.classList.remove('visible');
      });
      sessionList.appendChild(item);
    }
  }

  async function selectSession(id) {
    activeSessionId = id;
    streamingBubble = null;
    streamingText = '';
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    showEmpty(true);
    chatTitle.textContent = 'Loading...';

    try {
      const res = await fetch('/api/session/' + id + '/message?limit=50&order=asc');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const messages = await res.json();
      const session = messages.length > 0
        ? sessionsCache.find(s => s.id === id)
        : null;
      chatTitle.textContent = session ? (session.title || 'Glitch Chat') : 'Glitch Chat';

      if (messages && messages.length > 0) {
        showEmpty(false);
        for (const msg of messages) {
          if (!msg.data || !msg.data.role) continue;
          const role = msg.data.role;
          const text = extractMessageText(msg);
          const time = msg.time_created || msg.time_updated;
          if (text) addMessage(role, text, time);
        }
      }

      document.querySelectorAll('.session-item').forEach(el => {
        el.classList.toggle('active', el.dataset.sessionId === id);
      });
    } catch (err) {
      console.error('Failed to load messages:', err);
      chatTitle.textContent = 'Error loading chat';
    }
  }

  let sessionsCache = [];

  function extractMessageText(msg) {
    if (!msg || !msg.data) return '';
    if (msg.data.content) return msg.data.content;
    if (msg.data.parts && Array.isArray(msg.data.parts)) {
      const texts = msg.data.parts
        .filter(p => p && typeof p === 'object' && p.content)
        .map(p => p.content);
      if (texts.length) return texts.join('\n');
    }
    return '';
  }

  async function createNewSession() {
    try {
      setLoading(true);
      const session = await fetchJson('/api/session', {
        method: 'POST',
        body: JSON.stringify({ directory: DIRECTORY }),
      });
      const response = await fetchJson('/api/session?' + DIRECTORY_PARAM);
      const sessions = response.items || response || [];
      sessionsCache = sessions;
      renderSessions(sessions);
      selectSession(session.id);
      setTimeout(() => loadMessagesForActiveSession(), 300);
      setLoading(false);
    } catch (err) {
      console.error('Failed to create session:', err);
      setLoading(false);
      addMessage('error', 'Failed to create new session');
    }
  }

  // ── Sending Messages ────────────────────────────────────────

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || isWaiting) return;

    if (!activeSessionId) {
      try {
        const session = await fetchJson('/api/session', {
          method: 'POST',
          body: JSON.stringify({ directory: DIRECTORY }),
        });
        activeSessionId = session.id;
        const response = await fetchJson('/api/session?' + DIRECTORY_PARAM);
        const sessions = response.items || response || [];
        sessionsCache = sessions;
        renderSessions(sessions);
        chatTitle.textContent = session.title || 'Glitch Chat';
      } catch (err) {
        console.error('Failed to create session:', err);
        addMessage('error', 'Failed to create session');
        return;
      }
    }

    messageInput.value = '';
    messageInput.style.height = 'auto';
    addMessage('user', text);
    setLoading(true);
    showLoading();

    streamingBubble = null;
    streamingText = '';

    try {
      await fetch('/tui/submit-prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text }),
      });
      // Response comes via SSE — no need to wait here
    } catch (err) {
      console.error('Prompt submit failed:', err);
      hideLoading();
      addMessage('error', 'Failed to send message: ' + err.message);
      setLoading(false);
    }
  }

  // ── SSE Streaming ───────────────────────────────────────────

  function connectSSE() {
    if (eventSource) {
      eventSource.close();
    }

    eventSource = new EventSource('/api/event');

    eventSource.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        handleSSEEvent(data);
      } catch (err) {
        console.warn('Failed to parse SSE event:', err, event.data);
      }
    };

    eventSource.onerror = () => {
      eventSource.close();
      scheduleSSEReconnect();
    };

    sseReconnectDelay = 1000;
  }

  function scheduleSSEReconnect() {
    setTimeout(() => {
      connectSSE();
    }, sseReconnectDelay);
    sseReconnectDelay = Math.min(sseReconnectDelay * 2, SSE_MAX_RECONNECT);
  }

  function handleSSEEvent(data) {
    const type = data.type;
    const payload = data.payload || {};
    const sessionId = payload.session_id;

    if (!sessionId) return;

    switch (type) {
      case 'message.part.delta':
        handleDelta(sessionId, payload.text || '');
        break;

      case 'message.updated':
        handleUpdated(sessionId);
        break;

      case 'session.updated':
        handleSessionUpdated();
        break;
    }
  }

  function handleDelta(sessionId, text) {
    if (sessionId !== activeSessionId) return;

    hideLoading();

    if (!streamingBubble) {
      streamingBubble = addMessage('assistant', '');
      streamingText = '';
    }

    streamingText += text;
    const bubble = streamingBubble.querySelector('.message-bubble');
    if (bubble) {
      bubble.textContent = streamingText;
    }
    scrollToBottom();
  }

  function handleUpdated(sessionId) {
    if (sessionId !== activeSessionId) return;

    setLoading(false);
    streamingBubble = null;
    streamingText = '';

    // Reload messages to get the final persisted version
    loadMessagesForActiveSession();
    loadSessions();
  }

  async function loadMessagesForActiveSession() {
    if (!activeSessionId) return;
    try {
      const res = await fetch('/api/session/' + activeSessionId + '/message?limit=50&order=asc');
      if (!res.ok) return;
      const messages = await res.json();

      // Rebuild the message area from server state
      messagesEl.innerHTML = '';
      messagesEl.appendChild(emptyState);

      if (messages && messages.length > 0) {
        showEmpty(false);
        for (const msg of messages) {
          if (!msg.data || !msg.data.role) continue;
          const role = msg.data.role;
          const text = extractMessageText(msg);
          const time = msg.time_created || msg.time_updated;
          if (text) addMessage(role, text, time);
        }
      } else {
        showEmpty(true);
      }
    } catch (err) {
      console.error('Failed to reload messages:', err);
    }
  }

  function handleSessionUpdated() {
    loadSessions();
  }

  // ── Initialize ──────────────────────────────────────────────

  messageInput.style.height = 'auto';
  messageInput.style.height = messageInput.scrollHeight + 'px';

  connectSSE();
  loadSessions();
})();
</script>
</body>
</html>
