<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch Chat</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-sidebar: #0f0f1a;
    --bg-message-user: #7c3aed;
    --bg-message-assistant: #2d2d3d;
    --bg-message-error: #4a1525;
    --bg-input: #252540;
    --accent: #a855f7;
    --accent-hover: #9333ea;
    --accent-dim: #6b21a8;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #2a2a4a;
    --error: #ef4444;
    --sidebar-width: 260px;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .new-chat-btn {
    width: 100%;
    padding: 10px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s;
  }

  .new-chat-btn:hover { background: var(--accent-hover); }

  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .session-item {
    padding: 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, border-color 0.15s;
    border-left: 3px solid transparent;
    margin-bottom: 4px;
  }

  .session-item:hover { background: rgba(168, 85, 247, 0.1); }

  .session-item.active {
    background: rgba(168, 85, 247, 0.15);
    border-left-color: var(--accent);
  }

  .session-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 14px;
  }

  .session-count {
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* Main chat area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .menu-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 24px;
    cursor: pointer;
    padding: 4px;
  }

  .chat-title {
    font-size: 16px;
    font-weight: 600;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 18px;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; }
  .message.assistant { align-self: flex-start; }
  .message.error { align-self: center; max-width: 90%; }

  .message-role {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .message.user .message-role { text-align: right; }

  .message-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .message.user .message-bubble {
    background: var(--bg-message-user);
    border-bottom-right-radius: 4px;
  }

  .message.assistant .message-bubble {
    background: var(--bg-message-assistant);
    border-bottom-left-radius: 4px;
  }

  .message.error .message-bubble {
    background: var(--bg-message-error);
    border: 1px solid var(--error);
    color: var(--error);
  }

  .message-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .message.user .message-time { text-align: right; }

  /* Loading indicator */
  .loading {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .loading-dots {
    display: flex;
    gap: 4px;
  }

  .loading-dots span {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
  }

  .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
  .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
  }

  .input-wrapper {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    max-width: 800px;
    margin: 0 auto;
  }

  .input-wrapper textarea {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .input-wrapper textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .input-wrapper textarea:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .send-btn {
    padding: 12px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.2s, opacity 0.2s;
    white-space: nowrap;
  }

  .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Mobile responsive */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      transform: translateX(-100%);
    }

    .sidebar.open { transform: translateX(0); }

    .menu-toggle { display: block; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
    }

    .overlay.visible { display: block; }

    .message { max-width: 90%; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">
        <span>+</span> New Chat
      </button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </aside>

  <main class="main">
    <div class="chat-header">
      <button class="menu-toggle" id="menuToggle">&#9776;</button>
      <span class="chat-title" id="chatTitle">Glitch Chat</span>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">Start a conversation with Glitch</div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="messageInput"
          placeholder="Type a message..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>Send</button>
      </div>
    </div>
  </main>
</div>

<script>
(function() {
  'use strict';

  const $ = (sel) => document.querySelector(sel);
  const messagesEl = $('#messages');
  const emptyState = $('#emptyState');
  const sessionList = $('#sessionList');
  const messageInput = $('#messageInput');
  const sendBtn = $('#sendBtn');
  const newChatBtn = $('#newChatBtn');
  const chatTitle = $('#chatTitle');
  const menuToggle = $('#menuToggle');
  const sidebar = $('#sidebar');
  const overlay = $('#overlay');

  let activeSessionId = null;
  let isWaiting = false;
  let sessionCounter = 1;

  // Auto-resize textarea
  messageInput.addEventListener('input', () => {
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = !messageInput.value.trim() || isWaiting;
  });

  // Enter to send, Shift+Enter for newline
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (messageInput.value.trim() && !isWaiting) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  newChatBtn.addEventListener('click', createNewSession);
  menuToggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('visible');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
  });

  function formatTime(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showEmpty(show) {
    emptyState.style.display = show ? 'flex' : 'none';
  }

  function addMessage(role, text, timestamp) {
    showEmpty(false);
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const roleLabel = role === 'user' ? 'You' : role === 'error' ? 'Error' : 'Glitch';
    const time = timestamp ? formatTime(timestamp) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    msg.innerHTML = `
      <span class="message-role">${roleLabel}</span>
      <div class="message-bubble">${escapeHtml(text)}</div>
      <span class="message-time">${time}</span>
    `;

    messagesEl.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function showLoading() {
    const loader = document.createElement('div');
    loader.className = 'loading';
    loader.id = 'loadingIndicator';
    loader.innerHTML = `
      <span>Glitch is thinking</span>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    `;
    messagesEl.appendChild(loader);
    scrollToBottom();
  }

  function hideLoading() {
    const loader = document.getElementById('loadingIndicator');
    if (loader) loader.remove();
  }

  function setLoading(loading) {
    isWaiting = loading;
    sendBtn.disabled = loading || !messageInput.value.trim();
    messageInput.disabled = loading;
    messageInput.placeholder = loading ? 'Waiting for response...' : 'Type a message...';
  }

  async function fetchJson(url, options = {}) {
    const res = await fetch(url, {
      ...options,
      headers: { 'Content-Type': 'application/json', ...options.headers },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    return res.json();
  }

  async function loadSessions() {
    try {
      const sessions = await fetchJson('/api/sessions');
      renderSessions(sessions);

      if (sessions.length > 0) {
        const maxNum = sessions.reduce((max, s) => {
          const match = s.name && s.name.match(/Chat (\d+)/);
          return match ? Math.max(max, parseInt(match[1])) : max;
        }, 0);
        sessionCounter = maxNum + 1;
      }

      if (sessions.length === 0) {
        await createNewSession();
      } else if (!activeSessionId) {
        selectSession(sessions[0].id);
      }
    } catch (err) {
      console.error('Failed to load sessions:', err);
    }
  }

  function renderSessions(sessions) {
    sessionList.innerHTML = '';
    sessions.sort((a, b) => new Date(b.updated || b.created) - new Date(a.updated || a.created));

    for (const s of sessions) {
      const item = document.createElement('div');
      item.className = `session-item${s.id === activeSessionId ? ' active' : ''}`;
      item.dataset.sessionId = s.id;
      item.innerHTML = `
        <span class="session-name">${escapeHtml(s.name || 'Untitled')}</span>
        <span class="session-count">${s.messageCount || 0}</span>
      `;
      item.addEventListener('click', () => {
        selectSession(s.id);
        sidebar.classList.remove('open');
        overlay.classList.remove('visible');
      });
      sessionList.appendChild(item);
    }
  }

  async function selectSession(id) {
    activeSessionId = id;
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    showEmpty(true);
    chatTitle.textContent = 'Loading...';

    try {
      const messages = await fetchJson(`/api/sessions/${id}/messages`);
      chatTitle.textContent = 'Glitch Chat';

      if (messages && messages.length > 0) {
        showEmpty(false);
        for (const msg of messages) {
          addMessage(msg.role, msg.content, msg.timestamp || msg.created);
        }
      }

      // Update active state in sidebar
      document.querySelectorAll('.session-item').forEach(el => {
        el.classList.toggle('active', el.dataset.sessionId === id);
      });
    } catch (err) {
      console.error('Failed to load messages:', err);
      chatTitle.textContent = 'Error loading chat';
    }
  }

  async function createNewSession() {
    try {
      const session = await fetchJson('/api/sessions', {
        method: 'POST',
        body: JSON.stringify({ name: `Chat ${sessionCounter++}` }),
      });
      renderSessions([...(await fetchJson('/api/sessions'))]);
      selectSession(session.id);
    } catch (err) {
      console.error('Failed to create session:', err);
      addMessage('error', 'Failed to create new session');
    }
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || isWaiting) return;

    // If no active session, create one first
    if (!activeSessionId) {
      try {
        const session = await fetchJson('/api/sessions', {
          method: 'POST',
          body: JSON.stringify({ name: `Chat ${sessionCounter++}` }),
        });
        activeSessionId = session.id;
        renderSessions([...(await fetchJson('/api/sessions'))]);
        chatTitle.textContent = session.name || 'Glitch Chat';
      } catch (err) {
        console.error('Failed to create session:', err);
        addMessage('error', 'Failed to create session');
        return;
      }
    }

    messageInput.value = '';
    messageInput.style.height = 'auto';
    addMessage('user', text);
    setLoading(true);
    showLoading();

    let assistantBubble = null;
    let assistantText = '';

    try {
      const response = await fetch(`/api/sessions/${activeSessionId}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));

              if (data.error) {
                hideLoading();
                addMessage('error', data.error);
                setLoading(false);
                return;
              }

              if (data.text) {
                if (!assistantBubble) {
                  hideLoading();
                  assistantBubble = addMessage('assistant', '');
                }
                assistantText += data.text;
                assistantBubble.querySelector('.message-bubble').textContent = assistantText;
                scrollToBottom();
              }

              if (data.done) {
                setLoading(false);
                // Refresh session list to update message count
                loadSessions();
                return;
              }
            } catch (parseErr) {
              console.warn('Failed to parse SSE event:', parseErr, line);
            }
          }
        }
      }

      // Stream ended without done event
      setLoading(false);
    } catch (err) {
      console.error('Chat request failed:', err);
      hideLoading();
      addMessage('error', `Failed to get response: ${err.message}`);
      setLoading(false);
    }
  }

  // Initialize textarea height
  messageInput.style.height = 'auto';
  messageInput.style.height = messageInput.scrollHeight + 'px';

  // Initialize
  loadSessions();
})();
</script>
</body>
</html>
