<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栞 Shiori — Analytics</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0eb;
    --ink: #1a1a1a;
    --ink-muted: #7a706a;
    --border: #ddd5cc;
    --vermilion: #d4432a;
    --indigo: #3c4a6b;
    --hover: #ece4d9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  h1, h2, h3, h4 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .fade-in {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .metric-card {
    transition: background-color 0.4s ease;
    border-radius: 2px;
  }

  .metric-card:hover {
    background-color: var(--hover);
  }

  .chart-line {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: drawLine 2s ease forwards 0.6s;
  }

  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-pulse {
    animation: pulse 2.5s ease-in-out infinite;
  }

  .chip {
    cursor: pointer;
    transition: all 0.3s ease;
    user-select: none;
  }

  .chip:hover {
    color: var(--ink);
  }

  .chip.active {
    color: var(--ink);
    border-color: var(--ink);
  }

  .nav-pill {
    backdrop-filter: blur(8px);
    background: rgba(245, 240, 235, 0.85);
  }

  .nav-link {
    transition: color 0.3s ease;
  }

  .nav-link:hover {
    color: var(--vermilion);
  }

  .data-row {
    transition: background-color 0.3s ease;
  }

  .data-row:hover {
    background-color: var(--hover);
  }

  .trend-arrow {
    display: inline-block;
    transition: transform 0.3s ease;
  }

  .kpi-number {
    font-variant-numeric: tabular-nums;
    font-family: 'Noto Serif JP', serif;
  }
</style>
</head>
<body>

<!-- Floating nav pill -->
<nav class="nav-pill fixed top-6 right-8 z-50 flex items-center gap-6 px-5 py-2.5 rounded-full" style="border: 1px solid var(--border);">
  <span style="font-family: 'Noto Serif JP', serif; font-size: 14px; color: var(--ink);">栞</span>
  <a href="#" class="nav-link text-sm" style="color: var(--ink-muted);">概要</a>
  <a href="#" class="nav-link text-sm" style="color: var(--ink-muted);">データ</a>
  <a href="#" class="nav-link text-sm" style="color: var(--ink-muted);">設定</a>
</nav>

<!-- Main content -->
<main class="mx-auto" style="max-width: 960px; padding: 140px 32px 120px;">

  <!-- Page title -->
  <div class="fade-in" style="margin-bottom: 64px;">
    <h1 style="font-size: 28px; color: var(--ink); letter-spacing: 0.04em;">Analytics</h1>
    <p style="color: var(--ink-muted); font-size: 13px; margin-top: 6px;">Shiori dashboard — current period</p>
  </div>

  <!-- Date filter chips -->
  <div class="fade-in flex items-center gap-4" style="margin-bottom: 48px;" data-delay="100">
    <span class="chip active text-sm px-3 py-1 rounded-full" style="border: 1px solid var(--ink); color: var(--ink);">All time</span>
    <span class="chip text-sm px-3 py-1 rounded-full" style="border: 1px solid var(--border); color: var(--ink-muted);">30 days</span>
    <span class="chip text-sm px-3 py-1 rounded-full" style="border: 1px solid var(--border); color: var(--ink-muted);">7 days</span>
  </div>

  <!-- KPI section — asymmetric: large left, two stacked right -->
  <div class="flex flex-col md:flex-row gap-8 md:gap-12" style="margin-bottom: 80px;">

    <!-- Main KPI: Revenue -->
    <div class="fade-in metric-card md:w-3/5 p-8" style="border: 1px solid var(--border);" data-delay="200">
      <p style="color: var(--ink-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;">Revenue</p>
      <div class="flex items-baseline gap-3">
        <span class="kpi-number" id="kpi-revenue" style="font-size: 56px; line-height: 1; color: var(--ink);">¥0</span>
        <span class="trend-arrow" style="color: var(--vermilion);">
          <svg width="20" height="14" viewBox="0 0 20 14" fill="none" style="transform: rotate(-8deg);">
            <path d="M2 12 C6 10, 10 4, 18 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14 2 L18 2 L18 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
      <p style="color: var(--ink-muted); font-size: 13px; margin-top: 10px;">+12.4% from previous period</p>
    </div>

    <!-- Supporting metrics stacked -->
    <div class="flex flex-col gap-6 md:w-2/5">
      <div class="fade-in metric-card p-6 flex-1" style="border: 1px solid var(--border);" data-delay="300">
        <p style="color: var(--ink-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;">Active</p>
        <span class="kpi-number" id="kpi-active" style="font-size: 32px; color: var(--ink);">0</span>
        <p style="color: var(--ink-muted); font-size: 12px; margin-top: 6px;">users this period</p>
      </div>
      <div class="fade-in metric-card p-6 flex-1" style="border: 1px solid var(--border);" data-delay="400">
        <p style="color: var(--ink-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;">Growth</p>
        <span class="kpi-number" id="kpi-growth" style="font-size: 32px; color: var(--indigo);">0%</span>
        <p style="color: var(--ink-muted); font-size: 12px; margin-top: 6px;">month over month</p>
      </div>
    </div>
  </div>

  <!-- Chart section -->
  <div class="fade-in" style="margin-bottom: 80px;" data-delay="500">
    <div class="flex items-baseline justify-between" style="margin-bottom: 32px;">
      <h2 style="font-size: 18px; color: var(--ink);">Trend</h2>
      <span style="color: var(--ink-muted); font-size: 12px;">Monthly revenue</span>
    </div>
    <div class="metric-card p-6" style="border: 1px solid var(--border);">
      <svg viewBox="0 0 800 200" width="100%" height="200" preserveAspectRatio="none" style="display: block;">
        <!-- Bare axis -->
        <line x1="0" y1="199" x2="800" y2="199" stroke="var(--border)" stroke-width="1"/>
        <!-- Minimal tick marks -->
        <line x1="0" y1="195" x2="0" y2="199" stroke="var(--border)" stroke-width="1"/>
        <line x1="200" y1="195" x2="200" y2="199" stroke="var(--border)" stroke-width="1"/>
        <line x1="400" y1="195" x2="400" y2="199" stroke="var(--border)" stroke-width="1"/>
        <line x1="600" y1="195" x2="600" y2="199" stroke="var(--border)" stroke-width="1"/>
        <line x1="800" y1="195" x2="800" y2="199" stroke="var(--border)" stroke-width="1"/>
        <!-- Data line — indigo, thin, spare -->
        <path class="chart-line" d="M0 170 C40 165, 80 150, 120 140 C160 130, 200 145, 240 130 C280 115, 320 90, 360 85 C400 80, 440 95, 480 75 C520 55, 560 60, 600 45 C640 30, 680 40, 720 25 C760 15, 780 20, 800 10" fill="none" stroke="var(--indigo)" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Axis labels -->
        <text x="0" y="190" fill="var(--ink-muted)" font-size="10" font-family="system-ui">Jan</text>
        <text x="192" y="190" fill="var(--ink-muted)" font-size="10" font-family="system-ui">Mar</text>
        <text x="392" y="190" fill="var(--ink-muted)" font-size="10" font-family="system-ui">May</text>
        <text x="592" y="190" fill="var(--ink-muted)" font-size="10" font-family="system-ui">Jul</text>
        <text x="780" y="190" fill="var(--ink-muted)" font-size="10" font-family="system-ui">Sep</text>
      </svg>
    </div>
  </div>

  <!-- Data list — narrow, minimal -->
  <div class="fade-in" style="max-width: 560px;" data-delay="600">
    <h2 style="font-size: 18px; color: var(--ink); margin-bottom: 24px;">Recent</h2>
    <div style="border-top: 1px solid var(--border);">

      <div class="data-row flex items-center justify-between py-4 px-3" style="border-bottom: 1px solid var(--border);">
        <div class="flex items-center gap-4">
          <span class="status-pulse inline-block w-1.5 h-1.5 rounded-full" style="background: var(--vermilion);"></span>
          <span style="font-size: 14px;">田中太郎</span>
        </div>
        <span style="font-size: 12px; color: var(--ink-muted);">稼働</span>
        <span style="font-size: 14px; font-variant-numeric: tabular-nums;">¥24,800</span>
      </div>

      <div class="data-row flex items-center justify-between py-4 px-3" style="border-bottom: 1px solid var(--border);">
        <div class="flex items-center gap-4">
          <span class="status-pulse inline-block w-1.5 h-1.5 rounded-full" style="background: var(--vermilion); animation-delay: 0.4s;"></span>
          <span style="font-size: 14px;">佐藤花子</span>
        </div>
        <span style="font-size: 12px; color: var(--ink-muted);">稼働</span>
        <span style="font-size: 14px; font-variant-numeric: tabular-nums;">¥18,200</span>
      </div>

      <div class="data-row flex items-center justify-between py-4 px-3" style="border-bottom: 1px solid var(--border);">
        <div class="flex items-center gap-4">
          <span class="inline-block w-1.5 h-1.5 rounded-full" style="background: var(--ink-muted); opacity: 0.4;"></span>
          <span style="font-size: 14px;">鈴木健一</span>
        </div>
        <span style="font-size: 12px; color: var(--ink-muted);">停止</span>
        <span style="font-size: 14px; font-variant-numeric: tabular-nums;">¥0</span>
      </div>

      <div class="data-row flex items-center justify-between py-4 px-3" style="border-bottom: 1px solid var(--border);">
        <div class="flex items-center gap-4">
          <span class="status-pulse inline-block w-1.5 h-1.5 rounded-full" style="background: var(--vermilion); animation-delay: 0.8s;"></span>
          <span style="font-size: 14px;">山本美咲</span>
        </div>
        <span style="font-size: 12px; color: var(--ink-muted);">稼働</span>
        <span style="font-size: 14px; font-variant-numeric: tabular-nums;">¥31,500</span>
      </div>

    </div>
  </div>

  <!-- Footer mark -->
  <div class="fade-in" style="margin-top: 120px; text-align: left;" data-delay="700">
    <span style="font-family: 'Noto Serif JP', serif; font-size: 11px; color: var(--ink-muted); letter-spacing: 0.15em;">栞 Shiori v1.0</span>
  </div>

</main>

<script>
  // Fade-in on load with stagger
  document.addEventListener('DOMContentLoaded', () => {
    const items = document.querySelectorAll('.fade-in');
    items.forEach((el, i) => {
      const delay = parseInt(el.dataset.delay || (i * 100));
      setTimeout(() => el.classList.add('visible'), delay);
    });

    // Count-up animation for KPIs
    animateCounter('kpi-revenue', 0, 2847600, 1800, v => '¥' + v.toLocaleString());
    animateCounter('kpi-active', 0, 1284, 1400, v => v.toLocaleString());
    animateCounter('kpi-growth', 0, 12.4, 1600, v => v.toFixed(1) + '%');
  });

  function animateCounter(id, start, end, duration, formatter) {
    const el = document.getElementById(id);
    if (!el) return;
    const startTime = performance.now();
    const isFloat = !Number.isInteger(end);

    function step(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = isFloat
        ? start + (end - start) * eased
        : Math.round(start + (end - start) * eased);
      el.textContent = formatter(current);
      if (progress < 1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
  }

  // Date filter chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => {
        c.classList.remove('active');
        c.style.borderColor = 'var(--border)';
        c.style.color = 'var(--ink-muted)';
      });
      chip.classList.add('active');
      chip.style.borderColor = 'var(--ink)';
      chip.style.color = 'var(--ink)';
    });
  });
</script>

</body>
</html>
