<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>栞 — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --canvas: #f5f0eb;
      --ink: #1a1a1a;
      --ink-muted: #7a706a;
      --vermilion: #d4432a;
      --border: #ddd5cc;
      --focus-bg: #ece4d9;
      --serif: 'Noto Serif JP', 'Georgia', serif;
      --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: var(--canvas);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.7;
      min-height: 100dvh;
      padding: 80px 24px 120px;
    }

    .container {
      max-width: 560px;
      margin-left: 40px;
    }

    @media (max-width: 640px) {
      .container {
        margin-left: 0;
      }
      body {
        padding: 48px 20px 80px;
      }
    }

    /* Header */
    .page-header {
      margin-bottom: 80px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 600ms ease forwards;
    }

    .page-header h1 {
      font-family: var(--serif);
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 0.08em;
      color: var(--ink);
    }

    .page-header .subtitle {
      font-size: 0.8rem;
      color: var(--ink-muted);
      margin-top: 6px;
      letter-spacing: 0.15em;
    }

    /* Sections */
    .section {
      margin-bottom: 72px;
      opacity: 0;
      transform: translateY(20px);
    }

    .section.visible {
      animation: fadeUp 600ms ease forwards;
    }

    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .section-divider::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
    }

    .section-divider::after {
      content: '';
      flex: 0 0 24px;
      height: 1px;
      background: var(--border);
    }

    .section-title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      color: var(--ink);
    }

    /* Form fields */
    .field {
      margin-bottom: 28px;
    }

    .field-label {
      display: block;
      font-size: 0.75rem;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .text-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 0;
      font-family: var(--sans);
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      transition: background 300ms ease, border-color 300ms ease;
      position: relative;
    }

    .text-input-wrapper {
      position: relative;
    }

    .text-input-wrapper::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 100%;
      height: 1.5px;
      background: var(--ink);
      transform: translateX(-50%) scaleX(0);
      transition: transform 300ms ease;
    }

    .text-input:focus {
      background: var(--focus-bg);
    }

    .text-input-wrapper:focus-within::after {
      transform: translateX(-50%) scaleX(1);
    }

    /* Toggle switches */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .toggle-label {
      font-size: 0.9rem;
      color: var(--ink);
    }

    .toggle-desc {
      font-size: 0.75rem;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      transition: border-color 300ms ease, background 300ms ease;
    }

    .toggle-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      transform: translate(-50%, -50%);
      transition: background 300ms ease, transform 300ms ease;
    }

    .toggle input:checked ~ .toggle-track {
      border-color: var(--vermilion);
    }

    .toggle input:checked ~ .toggle-knob {
      background: var(--vermilion);
      transform: translate(-50%, -50%) scale(1.2);
    }

    /* Select dropdown */
    .select-wrapper {
      position: relative;
    }

    .select-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 24px 8px 0;
      font-family: var(--sans);
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: background 300ms ease;
    }

    .select-input:focus {
      background: var(--focus-bg);
    }

    .select-wrapper::after {
      content: '';
      position: absolute;
      right: 4px;
      top: 50%;
      width: 6px;
      height: 6px;
      border-right: 1px solid var(--ink-muted);
      border-bottom: 1px solid var(--ink-muted);
      transform: translateY(-70%) rotate(45deg);
      pointer-events: none;
    }

    /* Range slider */
    .slider-container {
      padding: 8px 0;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .slider-label-item {
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    .slider-label-item.active {
      color: var(--ink);
    }

    .range-input {
      width: 100%;
      height: 20px;
      appearance: none;
      background: transparent;
      cursor: pointer;
      outline: none;
    }

    .range-input::-webkit-slider-runnable-track {
      height: 1px;
      background: var(--border);
      border: none;
    }

    .range-input::-moz-range-track {
      height: 1px;
      background: var(--border);
      border: none;
    }

    .range-input::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--ink);
      border: none;
      margin-top: -7px;
      transition: background 200ms ease;
    }

    .range-input::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--ink);
      border: none;
      transition: background 200ms ease;
    }

    .range-input:hover::-webkit-slider-thumb {
      background: var(--vermilion);
    }

    .range-input:hover::-moz-range-thumb {
      background: var(--vermilion);
    }

    /* Danger button */
    .danger-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink-muted);
      font-family: var(--sans);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      padding: 10px 24px;
      cursor: pointer;
      transition: color 200ms ease, border-color 200ms ease, transform 200ms ease;
    }

    .danger-btn:hover {
      color: var(--vermilion);
      border-color: var(--vermilion);
      transform: scale(1.03);
    }

    /* Footer mark */
    .page-footer {
      margin-top: 96px;
      opacity: 0;
      transform: translateY(20px);
    }

    .page-footer.visible {
      animation: fadeUp 600ms ease forwards;
    }

    .footer-mark {
      font-family: var(--serif);
      font-size: 1.4rem;
      color: var(--border);
      letter-spacing: 0.2em;
    }

    /* Animation */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="page-header">
      <h1>設定</h1>
      <p class="subtitle">栞 &mdash; Shiori</p>
    </header>

    <section class="section" data-index="0">
      <div class="section-divider">
        <h2 class="section-title">Profile</h2>
      </div>
      <div class="field">
        <label class="field-label" for="name">Name</label>
        <div class="text-input-wrapper">
          <input type="text" id="name" class="text-input" value="佐藤 花子">
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <div class="text-input-wrapper">
          <input type="email" id="email" class="text-input" value="hanako@shiori.design">
        </div>
      </div>
    </section>

    <section class="section" data-index="1">
      <div class="section-divider">
        <h2 class="section-title">Notifications</h2>
      </div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Weekly report</div>
          <div class="toggle-desc">A summary delivered each Monday</div>
        </div>
        <label class="toggle">
          <input type="checkbox" checked>
          <span class="toggle-track"></span>
          <span class="toggle-knob"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Security notices</div>
          <div class="toggle-desc">Alerts for unusual account activity</div>
        </div>
        <label class="toggle">
          <input type="checkbox" checked>
          <span class="toggle-track"></span>
          <span class="toggle-knob"></span>
        </label>
      </div>
    </section>

    <section class="section" data-index="2">
      <div class="section-divider">
        <h2 class="section-title">Preferences</h2>
      </div>
      <div class="field">
        <label class="field-label" for="language">Language</label>
        <div class="select-wrapper">
          <select id="language" class="select-input">
            <option value="ja" selected>日本語</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Update frequency</label>
        <div class="slider-container">
          <div class="slider-labels">
            <span class="slider-label-item active">Daily</span>
            <span class="slider-label-item">Weekly</span>
            <span class="slider-label-item">Monthly</span>
          </div>
          <input type="range" class="range-input" min="0" max="2" value="0" step="1">
        </div>
      </div>
    </section>

    <section class="section" data-index="3">
      <div class="section-divider">
        <h2 class="section-title">Account</h2>
      </div>
      <button class="danger-btn" type="button">Delete account</button>
    </section>

    <footer class="page-footer">
      <div class="footer-mark">栞</div>
    </footer>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sections = document.querySelectorAll('.section');
      const footer = document.querySelector('.page-footer');

      sections.forEach((section, i) => {
        setTimeout(() => {
          section.classList.add('visible');
        }, 200 * (i + 1));
      });

      setTimeout(() => {
        footer.classList.add('visible');
      }, 200 * (sections.length + 1));

      const rangeInput = document.querySelector('.range-input');
      const labels = document.querySelectorAll('.slider-label-item');

      rangeInput.addEventListener('input', () => {
        labels.forEach((label, i) => {
          label.classList.toggle('active', i === parseInt(rangeInput.value));
        });
      });
    });
  </script>
</body>
</html>
