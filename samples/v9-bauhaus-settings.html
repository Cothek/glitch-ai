<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EINSTELLUNGEN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,600;0,700;0,900&display=swap');

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --blue: #0033CC;
  --red: #E3000B;
  --yellow: #FFD100;
  --black: #000;
  --white: #f5f5f0;
}

body {
  font-family: 'Archivo', sans-serif;
  background: var(--white);
  color: var(--black);
  min-height: 100vh;
  overflow-x: hidden;
}

.page {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 40px;
  min-height: 100vh;
  background: var(--black);
  flex-shrink: 0;
  animation: sidebarDraw 0.6s ease-out forwards;
}

@keyframes sidebarDraw {
  from { width: 0; }
  to { width: 40px; }
}

.main {
  flex: 1;
  padding: 40px 60px 60px 40px;
  position: relative;
}

.top-rule {
  height: 4px;
  background: var(--black);
  margin-bottom: 32px;
  animation: ruleDraw 0.5s ease-out forwards;
  transform-origin: left;
}

@keyframes ruleDraw {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}

.page-title {
  font-size: 64px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 48px;
  animation: fadeSlideUp 0.5s ease-out 0.2s both;
}

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto auto;
  gap: 32px;
  max-width: 1100px;
}

.section {
  border: 3px solid var(--black);
  padding: 28px;
  position: relative;
  opacity: 0;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.section-prof {
  grid-column: 1;
  grid-row: 1 / 3;
  animation: slideFromLeft 0.5s ease-out 0.3s forwards;
}

.section-notif {
  grid-column: 2;
  grid-row: 1;
  background: var(--yellow);
  animation: slideFromRight 0.5s ease-out 0.4s forwards;
}

.section-pref {
  grid-column: 1 / 3;
  grid-row: 2;
  animation: slideFromTop 0.5s ease-out 0.5s forwards;
  border-left: 8px solid var(--blue);
}

.section-danger {
  grid-column: 2;
  grid-row: 3;
  background: var(--red);
  animation: slideFromRight 0.5s ease-out 0.6s forwards;
}

@keyframes slideFromLeft {
  from { opacity: 0; transform: translateX(-60px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideFromRight {
  from { opacity: 0; transform: translateX(60px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideFromTop {
  from { opacity: 0; transform: translateY(-40px); }
  to { opacity: 1; transform: translateY(0); }
}

.field {
  margin-bottom: 20px;
}

.field:last-child {
  margin-bottom: 0;
}

.field-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.text-input {
  width: 100%;
  font-family: 'Archivo', sans-serif;
  font-size: 16px;
  font-weight: 600;
  padding: 8px 0;
  border: none;
  border-bottom: 3px solid transparent;
  background: transparent;
  color: var(--black);
  outline: none;
  transition: border-color 0.3s ease;
}

.text-input:focus {
  border-bottom-color: var(--yellow);
  animation: underlineExpand 0.3s ease-out forwards;
}

@keyframes underlineExpand {
  from { border-bottom-width: 0; }
  to { border-bottom-width: 3px; }
}

.text-input::placeholder {
  color: rgba(0,0,0,0.3);
  font-weight: 400;
}

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.toggle-row:last-child {
  margin-bottom: 0;
}

.toggle-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.toggle {
  width: 52px;
  height: 28px;
  border: 3px solid var(--black);
  background: var(--white);
  cursor: pointer;
  position: relative;
  transition: background 0.2s ease;
}

.toggle.active {
  background: var(--yellow);
}

.toggle-knob {
  width: 16px;
  height: 16px;
  background: var(--black);
  position: absolute;
  top: 3px;
  left: 3px;
  transition: left 0.2s ease;
}

.toggle.active .toggle-knob {
  left: 27px;
}

.pref-row {
  display: flex;
  align-items: center;
  gap: 40px;
}

.pref-field {
  flex: 1;
}

.pref-field-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.select-wrap {
  position: relative;
  cursor: pointer;
}

.select-display {
  font-family: 'Archivo', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 8px 16px;
  border: 3px solid var(--black);
  background: var(--white);
  user-select: none;
}

.select-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  border: 3px solid var(--black);
  border-top: none;
  background: var(--white);
  display: none;
  z-index: 10;
}

.select-dropdown.open {
  display: block;
}

.select-option {
  font-family: 'Archivo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.15s;
}

.select-option:hover {
  background: var(--yellow);
}

.slider-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
}

.slider {
  -webkit-appearance: none;
  appearance: none;
  width: 160px;
  height: 6px;
  background: var(--black);
  outline: none;
  cursor: pointer;
}

.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  background: var(--blue);
  border: 3px solid var(--black);
  cursor: pointer;
}

.slider::-moz-range-thumb {
  width: 20px;
  height: 20px;
  background: var(--blue);
  border: 3px solid var(--black);
  cursor: pointer;
  border-radius: 0;
}

.slider-value {
  font-size: 14px;
  font-weight: 700;
  min-width: 32px;
}

.danger-content {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  height: 100%;
}

.danger-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white);
  margin-bottom: 12px;
  opacity: 0.8;
}

.danger-btn {
  font-family: 'Archivo', sans-serif;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white);
  background: transparent;
  border: 3px solid var(--white);
  padding: 10px 24px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.danger-btn:hover {
  background: var(--white);
  color: var(--red);
}

.pulse-bar {
  position: fixed;
  top: 0;
  left: 40px;
  right: 0;
  height: 4px;
  background: var(--black);
  transform: scaleX(0);
  transform-origin: left;
  z-index: 100;
  pointer-events: none;
}

.pulse-bar.fire {
  animation: pulseFire 0.6s ease-out forwards;
}

@keyframes pulseFire {
  0% { transform: scaleX(0); opacity: 1; }
  50% { transform: scaleX(1); opacity: 1; }
  100% { transform: scaleX(1); opacity: 0; }
}

.decorative-circle {
  position: fixed;
  bottom: 40px;
  left: 80px;
  width: 80px;
  height: 80px;
  border: 3px solid var(--blue);
  border-radius: 50%;
  opacity: 0.15;
  animation: fadeSlideUp 0.8s ease-out 0.8s both;
}

.decorative-triangle {
  position: fixed;
  top: 120px;
  right: 40px;
  width: 0;
  height: 0;
  border-left: 30px solid transparent;
  border-right: 30px solid transparent;
  border-bottom: 52px solid var(--red);
  opacity: 0.1;
  animation: fadeSlideUp 0.8s ease-out 0.9s both;
}
</style>
</head>
<body>

<div class="pulse-bar" id="pulseBar"></div>

<div class="page">
  <div class="sidebar"></div>
  <div class="main">
    <div class="top-rule"></div>
    <h1 class="page-title">EINSTELLUNGEN</h1>

    <div class="grid">

      <div class="section section-prof">
        <div class="section-label">PROFIL</div>
        <div class="field">
          <label class="field-label" for="name">NAME</label>
          <input type="text" id="name" class="text-input" value="Hans Richter" placeholder="Name">
        </div>
        <div class="field">
          <label class="field-label" for="email">EMAIL</label>
          <input type="email" id="email" class="text-input" value="hans@bauhaus.design" placeholder="Email">
        </div>
      </div>

      <div class="section section-notif">
        <div class="section-label">BENACHRICHTIGUNGEN</div>
        <div class="toggle-row">
          <span class="toggle-label">PUSH</span>
          <div class="toggle active" data-toggle="push">
            <div class="toggle-knob"></div>
          </div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">EMAIL</span>
          <div class="toggle" data-toggle="email">
            <div class="toggle-knob"></div>
          </div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">WÖCHENTLICH</span>
          <div class="toggle active" data-toggle="weekly">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>

      <div class="section section-pref">
        <div class="section-label">EINSTELLUNGEN</div>
        <div class="pref-row">
          <div class="pref-field">
            <span class="pref-field-label">SPRACHE</span>
            <div class="select-wrap" id="langSelect">
              <div class="select-display">DEUTSCH</div>
              <div class="select-dropdown">
                <div class="select-option" data-value="DEUTSCH">DEUTSCH</div>
                <div class="select-option" data-value="ENGLISH">ENGLISH</div>
                <div class="select-option" data-value="FRANÇAIS">FRANÇAIS</div>
              </div>
            </div>
          </div>
          <div class="pref-field">
            <span class="pref-field-label">LAUTSTÄRKE</span>
            <div class="slider-wrap">
              <input type="range" class="slider" id="volumeSlider" min="0" max="100" value="72">
              <span class="slider-value" id="volumeValue">72</span>
            </div>
          </div>
        </div>
      </div>

      <div class="section section-danger">
        <div class="danger-content">
          <div class="danger-label">GEFAHR</div>
          <button class="danger-btn" id="deleteBtn">KONTO LÖSCHEN</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="decorative-circle"></div>
<div class="decorative-triangle"></div>

<script>
document.querySelectorAll('.toggle').forEach(toggle => {
  toggle.addEventListener('click', () => {
    toggle.classList.toggle('active');
    firePulse();
  });
});

const langSelect = document.getElementById('langSelect');
const display = langSelect.querySelector('.select-display');
const dropdown = langSelect.querySelector('.select-dropdown');

display.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdown.classList.toggle('open');
});

document.querySelectorAll('.select-option').forEach(opt => {
  opt.addEventListener('click', () => {
    display.textContent = opt.dataset.value;
    dropdown.classList.remove('open');
    firePulse();
  });
});

document.addEventListener('click', () => {
  dropdown.classList.remove('open');
});

const volumeSlider = document.getElementById('volumeSlider');
const volumeValue = document.getElementById('volumeValue');

volumeSlider.addEventListener('input', () => {
  volumeValue.textContent = volumeSlider.value;
});

volumeSlider.addEventListener('change', () => {
  firePulse();
});

document.querySelectorAll('.text-input').forEach(input => {
  input.addEventListener('change', () => {
    firePulse();
  });
});

document.getElementById('deleteBtn').addEventListener('click', () => {
  if (confirm('Konto wirklich löschen?')) {
    firePulse();
  }
});

function firePulse() {
  const bar = document.getElementById('pulseBar');
  bar.classList.remove('fire');
  void bar.offsetWidth;
  bar.classList.add('fire');
}
</script>

</body>
</html>
