<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprout Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --canvas: #faf6f2;
      --coral: #ff6b6b;
      --teal: #2ec4b6;
      --yellow: #ffd93d;
      --purple: #a29bfe;
      --text: #2d3436;
      --text-light: #636e72;
      --card-bg: #ffffff;
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --spring-soft: cubic-bezier(0.25, 1.25, 0.5, 1);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--canvas);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.3;
      z-index: 0;
      animation: blobFloat 8s ease-in-out infinite;
    }

    .blob-1 {
      width: 300px;
      height: 300px;
      background: var(--coral);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 250px;
      height: 250px;
      background: var(--teal);
      top: 200px;
      right: -80px;
      animation-delay: 2s;
    }

    .blob-3 {
      width: 200px;
      height: 200px;
      background: var(--yellow);
      bottom: 400px;
      left: 10%;
      animation-delay: 4s;
    }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -30px) scale(1.1); }
    }

    /* Container */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* Top bar */
    .top-bar {
      text-align: center;
      margin-bottom: 48px;
      opacity: 0;
      animation: bounceIn 0.8s var(--spring) forwards;
    }

    .greeting {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--coral), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-light);
      font-weight: 400;
    }

    /* Decorative SVG */
    .deco-svg {
      display: block;
      margin: 32px auto;
      opacity: 0;
      animation: bounceIn 0.8s var(--spring) 0.2s forwards;
    }

    /* Sections */
    .section {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      opacity: 0;
      animation: bounceIn 0.8s var(--spring) forwards;
      transition: transform 0.3s var(--spring), box-shadow 0.3s ease;
    }

    .section:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }

    .section:nth-child(1) { animation-delay: 0.3s; }
    .section:nth-child(2) { animation-delay: 0.45s; }
    .section:nth-child(3) { animation-delay: 0.6s; }
    .section:nth-child(4) { animation-delay: 0.75s; }

    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title .emoji {
      font-size: 1.8rem;
      display: inline-block;
      transition: transform 0.3s var(--spring);
    }

    .section-title .emoji:hover {
      animation: wobble 0.5s ease;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(8deg); }
    }

    /* Form fields */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }

    .field input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid transparent;
      border-radius: 20px;
      background: var(--canvas);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      color: var(--text);
      transition: all 0.3s var(--spring);
      outline: none;
    }

    .field input:focus {
      border-color: var(--coral);
      background: white;
      box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
      transform: scale(1.02);
    }

    .field input::placeholder {
      color: #b2bec3;
    }

    /* Toggle cards */
    .toggle-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .toggle-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--canvas);
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.4s var(--spring);
      user-select: none;
    }

    .toggle-card:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .toggle-card.active {
      transform: scale(1.02);
    }

    .toggle-card.active.coral {
      background: linear-gradient(135deg, #ff6b6b, #ff8787);
      box-shadow: 0 8px 24px rgba(255, 107, 107, 0.3);
    }

    .toggle-card.active.teal {
      background: linear-gradient(135deg, #2ec4b6, #4dd9cb);
      box-shadow: 0 8px 24px rgba(46, 196, 182, 0.3);
    }

    .toggle-card.active.purple {
      background: linear-gradient(135deg, #a29bfe, #b8b3ff);
      box-shadow: 0 8px 24px rgba(162, 155, 254, 0.3);
    }

    .toggle-card.active .card-label {
      color: white;
    }

    .card-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.1rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .card-label .emoji {
      font-size: 1.5rem;
      display: inline-block;
    }

    .toggle-switch {
      width: 56px;
      height: 32px;
      background: #dfe6e9;
      border-radius: 999px;
      position: relative;
      transition: background 0.3s ease;
    }

    .toggle-card.active .toggle-switch {
      background: rgba(255, 255, 255, 0.4);
    }

    .toggle-handle {
      width: 26px;
      height: 26px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.4s var(--spring);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .toggle-card.active .toggle-handle {
      transform: translateX(24px);
    }

    /* Theme picker */
    .theme-picker {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
    }

    .theme-option {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px 16px;
      background: var(--canvas);
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.4s var(--spring);
      position: relative;
    }

    .theme-option:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .theme-option.active {
      transform: scale(1.05);
    }

    .theme-dot {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      position: relative;
      transition: all 0.4s var(--spring);
    }

    .theme-option.active .theme-dot {
      transform: scale(1.2);
    }

    .theme-dot.light {
      background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
      box-shadow: 0 4px 16px rgba(253, 203, 110, 0.4);
    }

    .theme-dot.dark {
      background: linear-gradient(135deg, #2d3436, #636e72);
      box-shadow: 0 4px 16px rgba(45, 52, 54, 0.4);
    }

    .theme-dot.colorful {
      background: linear-gradient(135deg, var(--coral), var(--teal), var(--yellow));
      box-shadow: 0 4px 16px rgba(162, 155, 254, 0.4);
    }

    .theme-option.active .theme-dot::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      animation: checkPop 0.4s var(--spring);
    }

    @keyframes checkPop {
      0% { transform: translate(-50%, -50%) scale(0); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .theme-label {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
    }

    /* Slider */
    .slider-container {
      margin-top: 24px;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: var(--text-light);
      font-weight: 500;
    }

    .slider {
      position: relative;
      width: 100%;
      height: 12px;
      background: var(--canvas);
      border-radius: 999px;
      cursor: pointer;
    }

    .slider-fill {
      position: absolute;
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--coral));
      border-radius: 999px;
      transition: width 0.3s var(--spring);
    }

    .slider-thumb {
      position: absolute;
      width: 32px;
      height: 32px;
      background: white;
      border: 3px solid var(--coral);
      border-radius: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      transition: all 0.3s var(--spring);
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
    }

    .slider-thumb:hover {
      transform: translate(-50%, -50%) scale(1.1);
    }

    .slider-thumb:active {
      cursor: grabbing;
      transform: translate(-50%, -50%) scale(1.15);
    }

    /* Danger zone */
    .danger-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .danger-btn {
      padding: 20px 24px;
      border: none;
      border-radius: 24px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s var(--spring);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .danger-btn.export {
      background: linear-gradient(135deg, var(--teal), #4dd9cb);
      color: white;
      box-shadow: 0 6px 20px rgba(46, 196, 182, 0.3);
    }

    .danger-btn.export:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 10px 28px rgba(46, 196, 182, 0.4);
    }

    .danger-btn.delete {
      background: var(--canvas);
      color: var(--coral);
      border: 2px solid var(--coral);
    }

    .danger-btn.delete:hover {
      background: var(--coral);
      color: white;
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 10px 28px rgba(255, 107, 107, 0.3);
    }

    /* Snackbar */
    .snackbar {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: white;
      padding: 16px 28px;
      border-radius: 999px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      font-weight: 600;
      color: var(--text);
      opacity: 0;
      transition: all 0.5s var(--spring);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .snackbar.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .snackbar.hide {
      opacity: 0;
      transform: translateX(-50%) translateY(-20px);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .greeting {
        font-size: 2rem;
      }

      .section {
        padding: 24px 20px;
      }

      .theme-picker {
        gap: 12px;
      }

      .theme-option {
        padding: 20px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <div class="top-bar">
      <h1 class="greeting">Hey there! Let's tweak things.</h1>
      <p class="subtitle">Welcome back, Jamie 🌻</p>
    </div>

    <svg class="deco-svg" width="120" height="40" viewBox="0 0 120 40" fill="none">
      <circle cx="10" cy="20" r="6" fill="#ff6b6b" opacity="0.6"/>
      <circle cx="30" cy="20" r="4" fill="#2ec4b6" opacity="0.6"/>
      <circle cx="50" cy="20" r="8" fill="#ffd93d" opacity="0.6"/>
      <circle cx="70" cy="20" r="5" fill="#a29bfe" opacity="0.6"/>
      <circle cx="90" cy="20" r="7" fill="#ff6b6b" opacity="0.6"/>
      <circle cx="110" cy="20" r="4" fill="#2ec4b6" opacity="0.6"/>
    </svg>

    <div class="section">
      <h2 class="section-title">
        <span class="emoji">👤</span>
        About You
      </h2>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your name here ✨" value="Jamie">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com 📧" value="jamie@sprout.app">
      </div>
    </div>

    <div class="section">
      <h2 class="section-title">
        <span class="emoji">⚙️</span>
        Your Preferences
      </h2>
      <div class="toggle-cards">
        <div class="toggle-card coral active" data-toggle="sounds">
          <div class="card-label">
            <span class="emoji">🔔</span>
            <span>Sounds</span>
          </div>
          <div class="toggle-switch">
            <div class="toggle-handle"></div>
          </div>
        </div>
        <div class="toggle-card teal" data-toggle="digest">
          <div class="card-label">
            <span class="emoji">📧</span>
            <span>Weekly Digest</span>
          </div>
          <div class="toggle-switch">
            <div class="toggle-handle"></div>
          </div>
        </div>
        <div class="toggle-card purple active" data-toggle="tips">
          <div class="card-label">
            <span class="emoji">🎯</span>
            <span>Personalized Tips</span>
          </div>
          <div class="toggle-switch">
            <div class="toggle-handle"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="section-title">
        <span class="emoji">🎨</span>
        Vibe Settings
      </h2>
      <label style="display: block; font-size: 0.95rem; font-weight: 500; margin-bottom: 12px;">Theme</label>
      <div class="theme-picker">
        <div class="theme-option active" data-theme="light">
          <div class="theme-dot light"></div>
          <div class="theme-label">☀️ Light</div>
        </div>
        <div class="theme-option" data-theme="dark">
          <div class="theme-dot dark"></div>
          <div class="theme-label">🌙 Dark</div>
        </div>
        <div class="theme-option" data-theme="colorful">
          <div class="theme-dot colorful"></div>
          <div class="theme-label">🌈 Colorful</div>
        </div>
      </div>

      <div class="slider-container">
        <label style="display: block; font-size: 0.95rem; font-weight: 500; margin-bottom: 12px;">Notification frequency</label>
        <div class="slider-labels">
          <span>Chill</span>
          <span>Keep me posted</span>
        </div>
        <div class="slider" id="freq-slider">
          <div class="slider-fill" style="width: 50%;"></div>
          <div class="slider-thumb" style="left: 50%;"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="section-title">
        <span class="emoji">📦</span>
        Your Data
      </h2>
      <div class="danger-buttons">
        <button class="danger-btn export">
          <span>Export my stuff 📦</span>
        </button>
        <button class="danger-btn delete">
          <span>Say goodbye 💔</span>
        </button>
      </div>
    </div>
  </div>

  <div class="snackbar" id="snackbar">
    <span>✨</span>
    <span>Saved!</span>
  </div>

  <script>
    // Toggle cards
    document.querySelectorAll('.toggle-card').forEach(card => {
      card.addEventListener('click', () => {
        card.classList.toggle('active');
        showSnackbar();
      });
    });

    // Theme picker
    document.querySelectorAll('.theme-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active'));
        option.classList.add('active');
        showSnackbar();
      });
    });

    // Slider
    const slider = document.getElementById('freq-slider');
    const thumb = slider.querySelector('.slider-thumb');
    const fill = slider.querySelector('.slider-fill');
    let isDragging = false;

    function updateSlider(clientX) {
      const rect = slider.getBoundingClientRect();
      let percent = ((clientX - rect.left) / rect.width) * 100;
      percent = Math.max(0, Math.min(100, percent));
      thumb.style.left = percent + '%';
      fill.style.width = percent + '%';
    }

    thumb.addEventListener('mousedown', () => {
      isDragging = true;
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        updateSlider(e.clientX);
      }
    });

    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        document.body.style.userSelect = '';
        showSnackbar();
      }
    });

    slider.addEventListener('click', (e) => {
      if (e.target !== thumb) {
        updateSlider(e.clientX);
        showSnackbar();
      }
    });

    // Touch support
    thumb.addEventListener('touchstart', () => {
      isDragging = true;
    });

    document.addEventListener('touchmove', (e) => {
      if (isDragging) {
        updateSlider(e.touches[0].clientX);
      }
    });

    document.addEventListener('touchend', () => {
      if (isDragging) {
        isDragging = false;
        showSnackbar();
      }
    });

    // Input fields
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('change', showSnackbar);
    });

    // Buttons
    document.querySelectorAll('.danger-btn').forEach(btn => {
      btn.addEventListener('click', showSnackbar);
    });

    // Snackbar
    let snackbarTimeout;
    function showSnackbar() {
      const snackbar = document.getElementById('snackbar');
      clearTimeout(snackbarTimeout);
      
      snackbar.classList.remove('hide');
      snackbar.classList.add('show');
      
      snackbarTimeout = setTimeout(() => {
        snackbar.classList.remove('show');
        snackbar.classList.add('hide');
      }, 2000);
    }

    // Emoji wobble on hover
    document.querySelectorAll('.emoji').forEach(emoji => {
      emoji.addEventListener('mouseenter', () => {
        emoji.style.animation = 'none';
        setTimeout(() => {
          emoji.style.animation = '';
        }, 10);
      });
    });
  </script>
</body>
</html>
