<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Overview</title>
  <style>
    :root {
      --ds-color-bg: #0f172a;
      --ds-color-surface: #1e293b;
      --ds-color-text: #f1f5f9;
      --ds-color-text-secondary: #94a3b8;
      --ds-color-text-muted: #64748b;
      --ds-color-border: #334155;

      --ds-color-primary-50: #eef2ff;
      --ds-color-primary-100: #e0e7ff;
      --ds-color-primary-400: #818cf8;
      --ds-color-primary-500: #6366f1;
      --ds-color-primary-950: #1e1b4b;

      --ds-color-success-50: #f0fdf4;
      --ds-color-success-100: #dcfce7;
      --ds-color-success-400: #4ade80;
      --ds-color-success-500: #22c55e;
      --ds-color-success-950: #052e16;

      --ds-color-error-50: #fef2f2;
      --ds-color-error-100: #fee2e2;
      --ds-color-error-400: #f87171;
      --ds-color-error-500: #ef4444;
      --ds-color-error-950: #450a0a;

      --ds-color-info-50: #eff6ff;
      --ds-color-info-100: #dbeafe;
      --ds-color-info-400: #60a5fa;
      --ds-color-info-500: #3b82f6;
      --ds-color-info-950: #172554;

      --ds-font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --ds-font-mono: 'JetBrains Mono', 'SF Mono', Monaco, monospace;

      --ds-text-xs: 0.75rem;
      --ds-text-sm: 0.875rem;
      --ds-text-base: 1rem;
      --ds-text-lg: 1.125rem;
      --ds-text-xl: 1.25rem;
      --ds-text-2xl: 1.5rem;
      --ds-text-3xl: 1.875rem;
      --ds-text-4xl: 2.25rem;
      --ds-text-5xl: 3rem;

      --ds-space-1: 0.25rem;
      --ds-space-2: 0.5rem;
      --ds-space-3: 0.75rem;
      --ds-space-4: 1rem;
      --ds-space-5: 1.25rem;
      --ds-space-6: 1.5rem;
      --ds-space-8: 2rem;
      --ds-space-10: 2.5rem;
      --ds-space-12: 3rem;

      --ds-radius-sm: 0.25rem;
      --ds-radius-md: 0.375rem;
      --ds-radius-lg: 0.5rem;
      --ds-radius-xl: 0.75rem;
      --ds-radius-2xl: 1rem;

      --ds-shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --ds-shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --ds-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      --ds-shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);

      --ds-transition-fast: 150ms;
      --ds-transition-normal: 250ms;
      --ds-ease-default: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--ds-font-sans);
      background: var(--ds-color-bg);
      color: var(--ds-color-text);
      min-height: 100vh;
      padding: var(--ds-space-10);
    }

    .dashboard-header {
      margin-bottom: var(--ds-space-8);
    }

    .dashboard-header h1 {
      font-size: var(--ds-text-3xl);
      font-weight: 700;
      color: var(--ds-color-text);
      margin-bottom: var(--ds-space-2);
    }

    .dashboard-header p {
      font-size: var(--ds-text-sm);
      color: var(--ds-color-text-secondary);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--ds-space-6);
      max-width: 56rem;
    }

    .metric-card {
      background: var(--ds-color-surface);
      border: 1px solid var(--ds-color-border);
      border-radius: var(--ds-radius-xl);
      box-shadow: var(--ds-shadow-lg);
      padding: var(--ds-space-6);
      position: relative;
      overflow: hidden;
      transition: box-shadow var(--ds-transition-normal) var(--ds-ease-default),
                  transform var(--ds-transition-normal) var(--ds-ease-default);
    }

    .metric-card:hover {
      box-shadow: var(--ds-shadow-xl);
      transform: translateY(-2px);
    }

    .metric-card .accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }

    .metric-card .tint {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      pointer-events: none;
      border-radius: inherit;
    }

    .metric-card .card-content {
      position: relative;
      z-index: 1;
    }

    .metric-card .card-label {
      font-size: var(--ds-text-sm);
      color: var(--ds-color-text-secondary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--ds-space-3);
    }

    .metric-card .card-value {
      font-size: var(--ds-text-4xl);
      font-weight: 700;
      color: var(--ds-color-text);
      line-height: 1.1;
      margin-bottom: var(--ds-space-4);
      font-family: var(--ds-font-sans);
    }

    .metric-card .card-trend {
      display: inline-flex;
      align-items: center;
      gap: var(--ds-space-1);
      font-size: var(--ds-text-sm);
      font-weight: 500;
      padding: var(--ds-space-1) var(--ds-space-3);
      border-radius: var(--ds-radius-full);
    }

    .trend-up {
      color: var(--ds-color-success-400);
      background: var(--ds-color-success-950);
    }

    .trend-down {
      color: var(--ds-color-error-400);
      background: var(--ds-color-error-950);
    }

    .trend-arrow {
      font-size: var(--ds-text-xs);
      line-height: 1;
    }

    .card-primary .accent-bar { background: var(--ds-color-primary-500); }
    .card-primary .tint { background: var(--ds-color-primary-100); }

    .card-success .accent-bar { background: var(--ds-color-success-500); }
    .card-success .tint { background: var(--ds-color-success-100); }

    .card-error .accent-bar { background: var(--ds-color-error-500); }
    .card-error .tint { background: var(--ds-color-error-100); }

    .card-info .accent-bar { background: var(--ds-color-info-500); }
    .card-info .tint { background: var(--ds-color-info-100); }
  </style>
</head>
<body>
  <div class="dashboard-header">
    <h1>Dashboard Overview</h1>
    <p>Real-time metrics for the current period</p>
  </div>

  <div class="card-grid">
    <div class="metric-card card-primary">
      <div class="tint"></div>
      <div class="accent-bar"></div>
      <div class="card-content">
        <div class="card-label">Revenue</div>
        <div class="card-value">$48,290</div>
        <span class="card-trend trend-up">
          <span class="trend-arrow">&#9650;</span> 12.5%
        </span>
      </div>
    </div>

    <div class="metric-card card-success">
      <div class="tint"></div>
      <div class="accent-bar"></div>
      <div class="card-content">
        <div class="card-label">Active Users</div>
        <div class="card-value">3,842</div>
        <span class="card-trend trend-up">
          <span class="trend-arrow">&#9650;</span> 8.1%
        </span>
      </div>
    </div>

    <div class="metric-card card-error">
      <div class="tint"></div>
      <div class="accent-bar"></div>
      <div class="card-content">
        <div class="card-label">Error Rate</div>
        <div class="card-value">0.24%</div>
        <span class="card-trend trend-down">
          <span class="trend-arrow">&#9660;</span> 3.2%
        </span>
      </div>
    </div>

    <div class="metric-card card-info">
      <div class="tint"></div>
      <div class="accent-bar"></div>
      <div class="card-content">
        <div class="card-label">Uptime</div>
        <div class="card-value">99.98%</div>
        <span class="card-trend trend-up">
          <span class="trend-arrow">&#9650;</span> 0.02%
        </span>
      </div>
    </div>
  </div>
</body>
</html>
